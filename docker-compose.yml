services:
  db_main:
    build: ./db_main
    restart: always
    environment:
      - POSTGRES_PASSWORD=12345678
      - POSTGRES_USER=postgres
      - PGDATA=/var/lib/postgresql/data
    volumes:
      - edhub_main_storage:/var/lib/postgresql/data

  db_attachments:
    build: ./db_attachments
    restart: always
    environment:
      - POSTGRES_PASSWORD=12345678
      - POSTGRES_USER=postgres
      - PGDATA=/var/lib/postgresql/data
    volumes:
      - edhub_attachments_storage:/var/lib/postgresql/data

  backend:
    build: ./backend
    restart: always
    ports:
      - 8000:8000
    environment:
      - MAIN_DATABASE_URL=postgresql://postgres:12345678@db_main:5432/edhub
      - ATTACHMENTS_DB_URL=postgresql://postgres:12345678@db_attachments:5432/edhub_attachments
    volumes:
      - uploads_volume:/app/uploads
    depends_on:
      - db_main
      - db_attachments

  frontend:
    build: ./frontend
    restart: always
    ports:
      - 5173:5173
    depends_on:
      - db_main
      - db_attachments
      - backend

volumes:
  edhub_main_storage:
  edhub_attachments_storage:
  uploads_volume: